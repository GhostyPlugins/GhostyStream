# Nach wie vielen Minuten wird der Stream automatisch deaktiviert
stream-auto-stop-minutes: 60

# Belohnung für den Streamer pro Code-Einlösung (Vault-Währung)
streamer-reward: 2000.0

# GUI Einstellungen
