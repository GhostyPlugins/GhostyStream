  title: "&8» &6Content Creator &8«"
  size: 54
  # Item wenn kein Creator online/live ist
  empty-item:
    material: GRAY_STAINED_GLASS_PANE
    name: "&7Keine Creator aktiv"

# Debug-Modus (mehr Konsolen-Ausgaben)
debug: false
