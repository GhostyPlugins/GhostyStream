# Broadcast-Nachricht (alle X Minuten im Chat)
stream-broadcast: |
  &8&m                                        
  &#FF6A00&l 🎥 LIVESTREAM ANKÜNDIGUNG
  &7 Streamer: &e{player}
  &7 Link:     &#00BFFF{link}
  &8&m                                        

